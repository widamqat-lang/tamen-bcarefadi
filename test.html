<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Header</title>
  <style>
    :root {
      --primary: #0a4b8f;
      --accent: #f4b942;
      --line: #dbe7f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fb;
    }

    .top-bar {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 10px 12px;
      border-radius: 0 0 18px 18px;
      background: linear-gradient(135deg, #ffffff, #eff6ff);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 12px 24px rgba(10, 41, 82, 0.12);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .top-bar .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-bar .menu-btn {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
    }

    .top-bar .menu-btn span {
      display: block;
      width: 22px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
    }

    .top-bar .brand-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .top-bar .brand-wrap img {
      height: 34px;
      width: auto;
    }

    .lang-chip,
    .user-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 34px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 10px 18px rgba(14, 74, 138, 0.22);
    }

    .user-chip {
      background: linear-gradient(135deg, var(--accent), #ffe08a);
      color: #0b2f56;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-actions">
      <span class="user-chip">👤</span>
      <span class="lang-chip">EN</span>
    </div>
    <div class="brand-wrap">
      <img src="https://bcare.com.sa/assets/images/Bcare-logo.svg" alt="Bcare Logo">
    </div>
    <button class="menu-btn" type="button" aria-label="القائمة">
      <span></span><span></span><span></span>
    </button>
  </div>
</body>
</html>
